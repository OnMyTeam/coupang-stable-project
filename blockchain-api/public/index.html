<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coupang Stable RPC Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Tempo Payment RPC</p>
          <h1>Coupang Stable Console</h1>
        </div>
        <div class="endpoint-control">
          <label for="rpc-endpoint">Endpoint</label>
          <input id="rpc-endpoint" type="text" autocomplete="off" />
        </div>
      </header>

      <main class="workspace">
        <section class="status-strip" aria-label="RPC status">
          <button class="quick-card" id="health-button" type="button">
            <span class="quick-icon">+</span>
            <span>
              <strong>Health</strong>
              <small id="health-status">Idle</small>
            </span>
          </button>
          <button class="quick-card" id="block-button" type="button">
            <span class="quick-icon">#</span>
            <span>
              <strong>Block</strong>
              <small id="block-number">Idle</small>
            </span>
          </button>
          <button class="quick-card" id="methods-button" type="button">
            <span class="quick-icon">{ }</span>
            <span>
              <strong>Methods</strong>
              <small id="method-count">Idle</small>
            </span>
          </button>
        </section>

        <section class="main-grid">
          <div class="panel controls-panel">
            <section class="payment-panel" aria-label="Payment contract action">
              <p class="eyebrow">Payment Contract</p>
              <h2>Stablecoin Payment</h2>
              <form id="payment-form" class="payment-form">
                <label class="field full" for="payment-token">
                  <span>토큰 주소</span>
                  <input id="payment-token" type="text" autocomplete="off" placeholder="0x..." />
                </label>
                <label class="field full" for="payment-recipient">
                  <span>가맹점 EOA</span>
                  <input id="payment-recipient" type="text" autocomplete="off" placeholder="0x..." />
                </label>
                <label class="field full" for="payment-amount">
                  <span>수량</span>
                  <input id="payment-amount" type="text" inputmode="numeric" autocomplete="off" placeholder="1000000" />
                </label>
                <button class="primary-button" type="submit">결제 실행</button>
              </form>
            </section>

            <section class="api-picker-panel" aria-label="API request example">
              <div class="api-picker-header">
                <label class="field" for="api-method-select">
                  <span>API List</span>
                  <select id="api-method-select"></select>
                </label>
                <button class="secondary-button" id="refresh-api-list-button" type="button">Refresh</button>
              </div>
              <p class="method-hint" id="api-method-hint"></p>
            </section>

            <form class="raw-panel" id="raw-panel">
              <label class="field full">
                <span>JSON-RPC Payload</span>
                <textarea id="raw-payload" spellcheck="false"></textarea>
              </label>
              <div class="button-row">
                <button class="secondary-button" id="format-raw-button" type="button">Format</button>
                <button class="primary-button" type="submit">Send Raw</button>
              </div>
            </form>
          </div>

          <aside class="panel response-panel">
            <div class="response-header">
              <div>
                <p class="eyebrow">Response</p>
                <h2 id="response-title">Ready</h2>
              </div>
              <span class="badge" id="response-badge">Idle</span>
            </div>
            <pre id="response-output">{}</pre>
          </aside>
        </section>

        <section class="panel history-panel">
          <div class="history-header">
            <h2>History</h2>
            <button class="ghost-button" id="clear-history-button" type="button">Clear</button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
